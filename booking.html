<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Бронирование | Mövenpick Na Jomtien Siam Pattaya</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green: #1a2f24;
            --medium-green: #1e3c2f;
            --light-green: #2c5a3e;
            --gold: #c4a962;
            --cream: #f9f8f6;
            --white: #ffffff;
            --text: #2c2c2c;
            --text-light: #5e6b5e;
            --border: #e8dfd3;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        h1, h2, h3, .serif {
            font-family: 'Playfair Display', serif;
            font-weight: 600;
        }

        /* ===== СЛАЙДЕР НА ФОНЕ ===== */
        .bg-slider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .bg-slide.active {
            opacity: 1;
        }

        .bg-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.6));
            z-index: -1;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 24px;
            position: relative;
            z-index: 1;
        }

        /* ===== НАВИГАЦИЯ ===== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 1000;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding: 0.9rem 0;
        }

        .nav-inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--dark-green);
            text-decoration: none;
            letter-spacing: 0.5px;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            align-items: center;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark-green);
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.3s;
            letter-spacing: 0.3px;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--dark-green);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a.active {
            font-weight: 700;
        }

        .btn-book-nav {
            background: var(--dark-green);
            color: white !important;
            padding: 0.6rem 1.6rem !important;
            border-radius: 40px !important;
            font-weight: 600 !important;
        }

        .btn-book-nav::after {
            display: none !important;
        }

        /* ===== ФОРМА БРОНИРОВАНИЯ ===== */
        .booking-section {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 2.8rem 2.5rem;
            margin: 7rem auto 4rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .form-title {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--dark-green);
            font-family: 'Playfair Display', serif;
        }

        .form-sub {
            color: #5a6a5a;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 22px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            color: #2c382c;
            letter-spacing: 0.3px;
        }

        .optional-badge {
            font-weight: 400;
            font-size: 0.8rem;
            color: #8a9a8a;
            margin-left: 6px;
            font-style: italic;
        }

        input, select, textarea {
            padding: 0.95rem 1.2rem;
            border: 1px solid #d5cec2;
            border-radius: 16px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--dark-green);
            background: white;
            box-shadow: 0 0 0 3px rgba(30, 60, 47, 0.15);
        }

        .full-width {
            grid-column: span 2;
        }

        .comment-field {
            resize: vertical;
            min-height: 100px;
        }

        .btn-submit {
            background: var(--dark-green);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1.15rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 1.8rem;
            width: fit-content;
            min-width: 240px;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            display: block;
        }

        .btn-submit:hover {
            background: var(--light-green);
            box-shadow: 0 12px 25px rgba(30, 60, 47, 0.4);
            transform: translateY(-2px);
        }

        .thankyou-message {
            margin-top: 1.8rem;
            font-weight: 600;
            color: white;
            background: var(--dark-green);
            padding: 1rem 1.8rem;
            border-radius: 30px;
            display: none;
            font-size: 1.05rem;
            text-align: center;
            animation: fadeInUp 0.5s ease;
        }

        /* Индикатор слайдов */
        .slide-dots {
            position: fixed;
            bottom: 25px;
            right: 25px;
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .slide-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .slide-dot.active {
            background: white;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== АДАПТИВНОСТЬ ===== */
        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }
            .nav-links {
                gap: 1.2rem;
                flex-wrap: wrap;
                justify-content: center;
            }
            .nav-logo {
                font-size: 1.2rem;
            }
            .booking-section {
                padding: 1.8rem 1.2rem;
                margin: 5.5rem auto 3rem;
            }
            .full-width {
                grid-column: span 1;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .btn-submit {
                width: 100%;
                text-align: center;
            }
            .slide-dots {
                bottom: 15px;
                right: 15px;
            }
        }
    </style>
</head>
<body>
    <!-- СЛАЙДЕР ФОТО ОТЕЛЯ -->
    <div class="bg-slider" id="bgSlider">
        <div class="bg-slide active">
            <img src="C:\Users\ilika\Desktop\Project\photo\housesea.jpg">
        </div>
        <div class="bg-slide">
            <img src="C:\Users\ilika\Desktop\Project\photo\otel2.png">
        </div>
        <div class="bg-slide">
            <img src="C:\Users\ilika\Desktop\Project\photo/otel3.png" >
        </div>
        <div class="bg-slide">
            <img src="C:\Users\ilika\Desktop\Project\photo\otel4.png">
        </div>
        <div class="bg-slide">
            <img src="C:\Users\ilika\Desktop\Project\photo\otel.png">
        </div>
    </div>
    <div class="bg-overlay"></div>

    <!-- ТОЧКИ СЛАЙДЕРА -->
    <div class="slide-dots" id="slideDots">
        <span class="slide-dot active" onclick="goToSlide(0)"></span>
        <span class="slide-dot" onclick="goToSlide(1)"></span>
        <span class="slide-dot" onclick="goToSlide(2)"></span>
        <span class="slide-dot" onclick="goToSlide(3)"></span>
        <span class="slide-dot" onclick="goToSlide(4)"></span>
    </div>

    <!-- НАВИГАЦИЯ -->
    <nav class="navbar">
        <div class="nav-inner">
            <a href="index.html" class="nav-logo">Mövenpick Pattaya</a>
            <div class="nav-links">
                <a href="index.html">Главная</a>
                <a href="index.html#services">Услуги</a>
                <a href="booking.html" class="btn-book-nav active">Бронирование</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="booking-section">
            <h2 class="form-title">Заявка на бронирование</h2>
            <p class="form-sub">Заполните форму, и мы подтвердим вашу услугу в ближайшее время</p>

            <form id="bookingForm" onsubmit="handleSubmit(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="guestName">Имя гостя</label>
                        <input type="text" id="guestName" name="guestName" placeholder="Иван Петров" required>
                    </div>

                    <div class="form-group">
                        <label for="roomNumber">Номер комнаты</label>
                        <input type="text" id="roomNumber" name="roomNumber" placeholder="Например, 512" required>
                    </div>

                    <div class="form-group">
                        <label for="roomType">Тип номера</label>
                        <select id="roomType" name="roomType" required>
                            <option value="">-- Выберите тип номера --</option>
                            <option value="Economy Room">Эконом</option>
                            <option value="Standard Room">Стандарт</option>
                            <option value="VIP Room">ВИП</option>
                            <option value="Luxury Suite">Люкс</option>
                            <option value="Presidential Suite">Президентский</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="service">
                            Доп. услуга
                            <span class="optional-badge">(необязательно)</span>
                        </label>
                        <select id="service" name="service">
                            <option value="">-- Без услуги --</option>
                            <option value="BBQ Dinner by the Sea">BBQ Dinner by the Sea</option>
                            <option value="SPA Relax Package">SPA Relax Package</option>
                            <option value="Airport Transfer">Airport Transfer</option>
                            <option value="Kids Club Activities">Kids Club Activities</option>
                            <option value="Romantic Dinner">Romantic Dinner</option>
                            <option value="Local Tour Experience">Local Tour Experience</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="dateTime">Дата заезда</label>
                        <input type="date" id="dateTime" name="dateTime" required>
                    </div>

                    <div class="form-group">
                        <label for="guests">Количество гостей</label>
                        <input type="number" id="guests" name="guests" min="1" max="10" value="2" placeholder="2" required>
                    </div>

                    <div class="form-group full-width">
                        <label for="comment">Комментарий</label>
                        <textarea id="comment" name="comment" class="comment-field" placeholder="Особые пожелания, аллергии, дополнительная кровать..."></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Отправить заявку</button>
                <div id="thankYouMessage" class="thankyou-message">Thank you! Your request has been sent.</div>
            </form>
        </div>
    </div>

    <script>
        // ===== СЛАЙДЕР ФОТО =====
        const slides = document.querySelectorAll('.bg-slide');
        const dots = document.querySelectorAll('.slide-dot');
        let currentSlide = 0;
        let slideInterval;

        function showSlide(index) {
            slides.forEach(slide => slide.classList.remove('active'));
            dots.forEach(dot => dot.classList.remove('active'));
            
            slides[index].classList.add('active');
            dots[index].classList.add('active');
            currentSlide = index;
        }

        function nextSlide() {
            const next = (currentSlide + 1) % slides.length;
            showSlide(next);
        }

        function goToSlide(index) {
            showSlide(index);
            resetInterval();
        }

        function resetInterval() {
            clearInterval(slideInterval);
            slideInterval = setInterval(nextSlide, 4000);
        }

        // Запуск слайдера
        slideInterval = setInterval(nextSlide, 4000);

        // ===== АВТОЗАПОЛНЕНИЕ ИЗ URL =====
        (function() {
            const params = new URLSearchParams(window.location.search);
            const serviceParam = params.get('service');

            if (serviceParam) {
                const roomOptions = ['Economy Room', 'Standard Room', 'VIP Room', 'Luxury Suite', 'Presidential Suite'];
                const serviceOptions = ['BBQ Dinner by the Sea', 'SPA Relax Package', 'Airport Transfer', 'Kids Club Activities', 'Romantic Dinner', 'Local Tour Experience'];

                if (roomOptions.includes(serviceParam)) {
                    const roomSelect = document.getElementById('roomType');
                    setSelectValue(roomSelect, serviceParam);
                } else if (serviceOptions.includes(serviceParam)) {
                    const serviceSelect = document.getElementById('service');
                    setSelectValue(serviceSelect, serviceParam);
                }
            }
        })();

        function setSelectValue(selectElement, value) {
            if (selectElement) {
                for (let i = 0; i < selectElement.options.length; i++) {
                    if (selectElement.options[i].value === value) {
                        selectElement.selectedIndex = i;
                        break;
                    }
                }
            }
        }

        function handleSubmit(event) {
            event.preventDefault();
            const form = document.getElementById('bookingForm');
            const thankYou = document.getElementById('thankYouMessage');

            const formData = {
                guestName: document.getElementById('guestName').value,
                roomNumber: document.getElementById('roomNumber').value,
                roomType: document.getElementById('roomType').value,
                service: document.getElementById('service').value || 'Не выбрано',
                dateTime: document.getElementById('dateTime').value,
                guests: document.getElementById('guests').value,
                comment: document.getElementById('comment').value || 'Нет комментария'
            };

            console.log('📋 Данные бронирования:', formData);

            setTimeout(() => {
                thankYou.style.display = 'block';
                form.reset();
                setTimeout(() => {
                    thankYou.style.display = 'none';
                }, 5000);
            }, 300);

            return false;
        }
    </script>
</body>
</html>
